name: CI - Components

on:
  push:
    branches:
      - main
  pull_request: {}

env:
  NODE_VERSION: "24.x"

concurrency:
  group: ci-components-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  conditional-skip:
    runs-on: ubuntu-latest
    name: Get files changed and conditionally skip CI
    outputs:
      trigger-ci: ${{ steps.read-files.outputs.trigger-ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Get changed files
        id: read-files
        run: ./.github/scripts/filter_changed_files.sh "packages/components" "packages/flight-icons/catalog.json" "showcase" ".github/workflows/ci-components.yml" "packages/tokens"

  test:
    name: "Tests"
    runs-on: ubuntu-latest
    needs: [conditional-skip]
    if: needs.conditional-skip.outputs.trigger-ci == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install PNPM
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          run_install: false
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install
      - name: Build Components
        run: pnpm build
        working-directory: packages/components
      - name: Lint Showcase
        run: pnpm lint
        working-directory: showcase
      - name: Lint Components
        run: pnpm lint
        working-directory: packages/components
      - name: Resolve Chrome for Percy (as Percy fails to do so)
        run: |
          set -euo pipefail

          if command -v google-chrome >/dev/null 2>&1; then
            echo "PERCY_BROWSER_EXECUTABLE=$(command -v google-chrome)" >> "$GITHUB_ENV"
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            echo "PERCY_BROWSER_EXECUTABLE=$(command -v google-chrome-stable)" >> "$GITHUB_ENV"
          elif command -v chromium-browser >/dev/null 2>&1; then
            echo "PERCY_BROWSER_EXECUTABLE=$(command -v chromium-browser)" >> "$GITHUB_ENV"
          elif command -v chromium >/dev/null 2>&1; then
            echo "PERCY_BROWSER_EXECUTABLE=$(command -v chromium)" >> "$GITHUB_ENV"
          else
            echo "No system Chrome/Chromium executable found; Percy will try to download Chromium."
          fi
      - name: Run Tests
        run: pnpm test:ember:percy
        working-directory: showcase
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN_COMPONENTS }}
          BROWSERSLIST_IGNORE_OLD_DATA: 1

  try-scenarios:
    name: ${{ matrix.try-scenario }}
    runs-on: ubuntu-latest
    needs: "test"

    strategy:
      fail-fast: false
      matrix:
        try-scenario:
          - ember-lts-5.12
          # - ember-release
          - embroider-safe
          - embroider-optimized

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install PNPM
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          run_install: false
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install
      - name: Build Components
        run: pnpm build
        working-directory: packages/components
      - name: Run Tests
        working-directory: showcase
        run: pnpm ember try:one ${{ matrix.try-scenario }}
        env:
          PERCY_ENABLE: 0
