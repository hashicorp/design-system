name: CI - Components

on:
  push:
    branches:
      - main
  pull_request: {}

env:
  NODE_VERSION: "24.x"

concurrency:
  group: ci-components-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  conditional-skip:
    runs-on: ubuntu-latest
    name: Get files changed and conditionally skip CI
    outputs:
      trigger-ci: ${{ steps.read-files.outputs.trigger-ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Get changed files
        id: read-files
        run: ./.github/scripts/filter_changed_files.sh "packages/components" "packages/flight-icons/catalog.json" "showcase" ".github/workflows/ci-components.yml" "packages/tokens"

  test:
    name: "Tests"
    runs-on: ubuntu-latest
    needs: [conditional-skip]
    if: needs.conditional-skip.outputs.trigger-ci == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install PNPM
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          run_install: false
      - name: Install Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install
      - name: Restore Percy browser cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: |
            ~/.cache/puppeteer
            ~/.cache/ms-playwright
            ~/.cache/percy
          key: percy-browser-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            percy-browser-cache-${{ runner.os }}-
      - name: Build Components
        run: pnpm build
        working-directory: packages/components
      - name: Lint Showcase
        run: pnpm lint
        working-directory: showcase
      - name: Lint Components
        run: pnpm lint
        working-directory: packages/components
      - name: Resolve browser executable for Percy
        run: |
          set -euo pipefail

          if command -v google-chrome >/dev/null 2>&1; then
            echo "PERCY_BROWSER_EXECUTABLE=$(command -v google-chrome)" >> "$GITHUB_ENV"
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            echo "PERCY_BROWSER_EXECUTABLE=$(command -v google-chrome-stable)" >> "$GITHUB_ENV"
          elif command -v chromium-browser >/dev/null 2>&1; then
            echo "PERCY_BROWSER_EXECUTABLE=$(command -v chromium-browser)" >> "$GITHUB_ENV"
          elif command -v chromium >/dev/null 2>&1; then
            echo "PERCY_BROWSER_EXECUTABLE=$(command -v chromium)" >> "$GITHUB_ENV"
          else
            echo "No system Chrome/Chromium executable found; Percy will download Chromium."
          fi
      - name: Run Tests
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Percy test attempt ${attempt}/3"

            if timeout 30m pnpm test:ember:percy; then
              exit 0
            fi

            exit_code=$?
            echo "Percy test attempt ${attempt} failed with exit code ${exit_code}"

            if [ "${attempt}" -lt 3 ]; then
              echo "Retrying Percy test to recover from transient Chromium download/upload failures..."
            fi
          done

          echo "Percy test failed after 3 attempts"
          exit 1
        working-directory: showcase
        timeout-minutes: 35
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN_COMPONENTS }}
          PERCY_POSTINSTALL_BROWSER: 0
          LOG_LEVEL: debug
          PERCY_DEBUG: "*"

  try-scenarios:
    name: ${{ matrix.try-scenario }}
    runs-on: ubuntu-latest
    needs: "test"

    strategy:
      fail-fast: false
      matrix:
        try-scenario:
          - ember-lts-5.12
          # - ember-release
          - embroider-safe
          - embroider-optimized

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install PNPM
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          run_install: false
      - name: Install Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install
      - name: Build Components
        run: pnpm build
        working-directory: packages/components
      - name: Run Tests
        working-directory: showcase
        run: pnpm ember try:one ${{ matrix.try-scenario }}
        env:
          PERCY_ENABLE: 0
