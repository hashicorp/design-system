name: Check PR Jira Ticket

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: check-pr-jira-ticket-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-pr-jira-ticket:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check PR body for Jira ticket
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/check-pr-jira-ticket.cjs